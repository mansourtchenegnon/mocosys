model: # model configuration
  arch:
    channels: 256
    channels_in : 2
    channels_out : 3
    units : 32  # skeleton model, dense layer 
    residual: true
    stages: 1
    window: 3

running:
  epochs: 10
  batch_size: 128
  data_cut : 50
  version: None

dataset: # dataset configuration
  name: h36m
  keypoints: gt
  estimation: None
  graph: # configuration for the skeleton format
    skeleton:
      number_of_joints: 17
      joint_input_features: 2
      joint_output_features: 3
      parents: []
      bones: []
